<form [formGroup]="residenteForm">
  <div class="form-container">

    <!-- Nombre -->
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombrePila" placeholder="Juan">
      <mat-error *ngIf="residenteForm.get('nombrePila')?.hasError('required')">
        El nombre es requerido.
      </mat-error>
    </mat-form-field>

    <!-- Apellido -->
    <mat-form-field appearance="outline">
      <mat-label>Apellido</mat-label>
      <input matInput formControlName="apellido" placeholder="Pérez">
      <mat-error *ngIf="residenteForm.get('apellido')?.hasError('required')">
        El apellido es requerido.
      </mat-error>
    </mat-form-field>

    <!-- DNI -->
    <mat-form-field appearance="outline">
      <mat-label>DNI</mat-label>
      <input matInput type="number" formControlName="dniCuit" placeholder="12345678">
      <mat-error *ngIf="residenteForm.get('dniCuit')?.hasError('required')">
        El DNI es requerido.
      </mat-error>
      <mat-error *ngIf="residenteForm.get('dniCuit')?.hasError('pattern')">
        Solo se admiten números.
      </mat-error>
    </mat-form-field>

    <!-- Fecha de Ingreso -->
    <mat-form-field appearance="outline">
      <mat-label>Fecha de Ingreso</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="fechaIngreso">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="residenteForm.get('fechaIngreso')?.hasError('required')">
        La fecha es requerida.
      </mat-error>
    </mat-form-field>

    <!-- Nota -->
    <mat-form-field appearance="outline">
      <mat-label>Nota (Opcional)</mat-label>
      <textarea matInput formControlName="nota" cdkTextareaAutosize cdkAutosizeMinRows="2" cdkAutosizeMaxRows="5"></textarea>
    </mat-form-field>

    <!-- Es Activo -->
    <mat-checkbox formControlName="esActivo">Residente activo</mat-checkbox>

  </div>
</form>
