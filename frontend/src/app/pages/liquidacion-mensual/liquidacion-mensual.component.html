<div class="container p-4 h-100 crud-container">
  <h1 class="text-2xl font-bold mb-4">Liquidación Mensual de Residentes</h1>
  <form [formGroup]="liquidacionMensualForm" (ngSubmit)="guardarLiquidacion()" style="height: 80vh;">
    <!-- Controles de Mes y Año -->
    <div class="d-flex gap-3 mb-4">
      <mat-form-field appearance="outline" class="flex-fill">
        <mat-label>Mes</mat-label>
        <input matInput type="number" formControlName="mes" placeholder="1-12">
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-fill">
        <mat-label>Año</mat-label>
        <input matInput type="number" formControlName="ano" placeholder="2024">
      </mat-form-field>
    </div>

    <!-- Tabla de Liquidación por Residente -->
    <div class="bg-white shadow rounded list-crud-container" formArrayName="residentesLiquidacion">
      <table mat-table [dataSource]="dataSource" class="w-100">

        <!-- Columna Nombre del Residente -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> Residente </th>
          <td mat-cell *matCellDef="let element; let i = index;">
            {{residentes[i]?.apellido}}, {{residentes[i]?.nombre}} ({{residentes[i]?.dniCuit}})
          </td>
        </ng-container>

        <!-- Columna Cuota Mensual -->
        <ng-container matColumnDef="mensual">
          <th mat-header-cell *matHeaderCellDef> Cuota Mensual ($) </th>
          <td mat-cell *matCellDef="let element; let i = index;" [formGroupName]="i">
            <mat-form-field appearance="outline" class="w-100 no-subscript">
              <input matInput currencyMask type="text" formControlName="mensual" placeholder="0.00">
            </mat-form-field>
          </td>
        </ng-container>

        <!-- Columna Pañales -->
        <ng-container matColumnDef="panales">
          <th mat-header-cell *matHeaderCellDef> Pañales ($) </th>
          <td mat-cell *matCellDef="let element; let i = index;" [formGroupName]="i">
            <mat-form-field appearance="outline" class="w-100 no-subscript">
              <input matInput currencyMask type="text" formControlName="panales" placeholder="0.00">
            </mat-form-field>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>

    <!-- Botón de Guardar -->
    <div class="d-flex justify-content-end mt-4">
      <button mat-raised-button color="primary" type="submit" [disabled]="liquidacionMensualForm.invalid">
        <mat-icon>save</mat-icon>
        Guardar Liquidación
      </button>
    </div>
  </form>
</div>
