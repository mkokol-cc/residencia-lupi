<h2 mat-dialog-title>{{ data.tipoOperacion ? 'Editar' : 'Nuevo' }} Tipo de Operación</h2>
<mat-dialog-content>
    <app-form-tipo-operacion 
        [tipoOperacion]="data.tipoOperacion"
        (save)="onSave($event)">
    </app-form-tipo-operacion>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-raised-button color="primary" (click)="formComponent.submit()">Guardar</button>
</mat-dialog-actions>
