<h2 mat-dialog-title>{{ data.concepto ? 'Editar' : 'Agregar' }} Concepto</h2>

<mat-dialog-content>
  <app-form-concepto 
    [concepto]="data.concepto" 
    [conceptosPadre]="data.conceptosPadre"
    (save)="handleFormSave($event)">
  </app-form-concepto>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSaveClick()">Guardar</button>
</mat-dialog-actions>
