<h2 mat-dialog-title>{{ data.movimiento ? 'Editar' : 'Agregar' }} Movimiento</h2>

<mat-dialog-content>
  <app-form-movimiento 
    [movimiento]="data.movimiento"
    [entidades]="data.entidades"
    [conceptos]="data.conceptos"
    (save)="handleFormSave($event)">
  </app-form-movimiento>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSaveClick()">Guardar</button>
</mat-dialog-actions>
